services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "3000:3000"

  api:
    build: .
    command: ["python", "-m", "rag_ops.api.app"]
    env_file:
      - .env
    environment:
      RAG_OPS_ENV: ${RAG_OPS_ENV:-development}
      RAG_OPS_API_HOST: 0.0.0.0
      RAG_OPS_API_PORT: 8000
      RAG_OPS_DATABASE_URL: ${RAG_OPS_DATABASE_URL:-postgresql+psycopg://postgres:${RAG_OPS_POSTGRES_PASSWORD}@postgres:5432/rag_ops}
      RAG_OPS_STATE_DIR: /app/.rag_ops
      RAG_OPS_CACHE_DIR: /app/.rag_ops_cache
      RAG_OPS_RUNS_DIR: /app/.rag_ops_runs
      RAG_OPS_REDIS_ENABLED: ${RAG_OPS_REDIS_ENABLED:-true}
      RAG_OPS_REDIS_URL: ${RAG_OPS_REDIS_URL:-redis://redis:6379/0}
      RAG_OPS_QUEUE_BACKEND: ${RAG_OPS_QUEUE_BACKEND:-dramatiq}
      RAG_OPS_AUTH_MODE: ${RAG_OPS_AUTH_MODE:-oidc}
      RAG_OPS_AUTH_OIDC_DISCOVERY_URL: ${RAG_OPS_AUTH_OIDC_DISCOVERY_URL:-}
      RAG_OPS_AUTH_OIDC_JWKS_URL: ${RAG_OPS_AUTH_OIDC_JWKS_URL:-}
      RAG_OPS_AUTH_JWT_ISSUER: ${RAG_OPS_AUTH_JWT_ISSUER:-}
      RAG_OPS_AUTH_JWT_AUDIENCE: ${RAG_OPS_AUTH_JWT_AUDIENCE:-}
      RAG_OPS_CREDENTIAL_KEY: ${RAG_OPS_CREDENTIAL_KEY:?set RAG_OPS_CREDENTIAL_KEY in .env}
      RAG_OPS_CREDENTIAL_ACTIVE_KEY_ID: ${RAG_OPS_CREDENTIAL_ACTIVE_KEY_ID:-v1}
      RAG_OPS_CREDENTIAL_KEYS_JSON: ${RAG_OPS_CREDENTIAL_KEYS_JSON:-}
      RAG_OPS_OBJECT_STORE_ENABLED: ${RAG_OPS_OBJECT_STORE_ENABLED:-true}
      RAG_OPS_OBJECT_STORE_ENDPOINT: ${RAG_OPS_OBJECT_STORE_ENDPOINT:-http://minio:9000}
      RAG_OPS_OBJECT_STORE_BUCKET: ${RAG_OPS_OBJECT_STORE_BUCKET:-rag-ops}
      RAG_OPS_OBJECT_STORE_ACCESS_KEY: ${RAG_OPS_OBJECT_STORE_ACCESS_KEY:-${RAG_OPS_MINIO_ROOT_USER}}
      RAG_OPS_OBJECT_STORE_SECRET_KEY: ${RAG_OPS_OBJECT_STORE_SECRET_KEY:-${RAG_OPS_MINIO_ROOT_PASSWORD}}
      RAG_OPS_METRICS_ENABLED: ${RAG_OPS_METRICS_ENABLED:-true}
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - rag_ops_state:/app/.rag_ops
      - rag_ops_cache:/app/.rag_ops_cache
      - rag_ops_runs:/app/.rag_ops_runs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: ["python", "-m", "rag_ops.workers.main"]
    env_file:
      - .env
    environment:
      RAG_OPS_ENV: ${RAG_OPS_ENV:-development}
      RAG_OPS_DATABASE_URL: ${RAG_OPS_DATABASE_URL:-postgresql+psycopg://postgres:${RAG_OPS_POSTGRES_PASSWORD}@postgres:5432/rag_ops}
      RAG_OPS_STATE_DIR: /app/.rag_ops
      RAG_OPS_CACHE_DIR: /app/.rag_ops_cache
      RAG_OPS_RUNS_DIR: /app/.rag_ops_runs
      RAG_OPS_REDIS_ENABLED: ${RAG_OPS_REDIS_ENABLED:-true}
      RAG_OPS_REDIS_URL: ${RAG_OPS_REDIS_URL:-redis://redis:6379/0}
      RAG_OPS_QUEUE_BACKEND: ${RAG_OPS_QUEUE_BACKEND:-dramatiq}
      RAG_OPS_AUTH_MODE: ${RAG_OPS_AUTH_MODE:-oidc}
      RAG_OPS_AUTH_OIDC_DISCOVERY_URL: ${RAG_OPS_AUTH_OIDC_DISCOVERY_URL:-}
      RAG_OPS_AUTH_OIDC_JWKS_URL: ${RAG_OPS_AUTH_OIDC_JWKS_URL:-}
      RAG_OPS_AUTH_JWT_ISSUER: ${RAG_OPS_AUTH_JWT_ISSUER:-}
      RAG_OPS_AUTH_JWT_AUDIENCE: ${RAG_OPS_AUTH_JWT_AUDIENCE:-}
      RAG_OPS_CREDENTIAL_KEY: ${RAG_OPS_CREDENTIAL_KEY:?set RAG_OPS_CREDENTIAL_KEY in .env}
      RAG_OPS_CREDENTIAL_ACTIVE_KEY_ID: ${RAG_OPS_CREDENTIAL_ACTIVE_KEY_ID:-v1}
      RAG_OPS_CREDENTIAL_KEYS_JSON: ${RAG_OPS_CREDENTIAL_KEYS_JSON:-}
      RAG_OPS_OBJECT_STORE_ENABLED: ${RAG_OPS_OBJECT_STORE_ENABLED:-true}
      RAG_OPS_OBJECT_STORE_ENDPOINT: ${RAG_OPS_OBJECT_STORE_ENDPOINT:-http://minio:9000}
      RAG_OPS_OBJECT_STORE_BUCKET: ${RAG_OPS_OBJECT_STORE_BUCKET:-rag-ops}
      RAG_OPS_OBJECT_STORE_ACCESS_KEY: ${RAG_OPS_OBJECT_STORE_ACCESS_KEY:-${RAG_OPS_MINIO_ROOT_USER}}
      RAG_OPS_OBJECT_STORE_SECRET_KEY: ${RAG_OPS_OBJECT_STORE_SECRET_KEY:-${RAG_OPS_MINIO_ROOT_PASSWORD}}
      RAG_OPS_METRICS_ENABLED: ${RAG_OPS_METRICS_ENABLED:-true}
      RAG_OPS_WORKER_METRICS_PORT: ${RAG_OPS_WORKER_METRICS_PORT:-9101}
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - rag_ops_state:/app/.rag_ops
      - rag_ops_cache:/app/.rag_ops_cache
      - rag_ops_runs:/app/.rag_ops_runs
    ports:
      - "9101:9101"

  admin-ui:
    build: .
    command: ["streamlit", "run", "app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    env_file:
      - .env
    environment:
      RAG_OPS_API_BASE_URL: ${RAG_OPS_API_BASE_URL:-http://api:8000}
      RAG_OPS_RUNS_DIR: /app/.rag_ops_runs
    depends_on:
      - api
    volumes:
      - rag_ops_runs:/app/.rag_ops_runs
    ports:
      - "8501:8501"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rag_ops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${RAG_OPS_POSTGRES_PASSWORD:?set RAG_OPS_POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_ops"]
      interval: 20s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${RAG_OPS_MINIO_ROOT_USER:?set RAG_OPS_MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${RAG_OPS_MINIO_ROOT_PASSWORD:?set RAG_OPS_MINIO_ROOT_PASSWORD in .env}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  prometheus:
    image: prom/prometheus:v3.2.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    depends_on:
      - api
      - worker
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.5.2
    environment:
      GF_SECURITY_ADMIN_USER: ${RAG_OPS_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${RAG_OPS_GRAFANA_ADMIN_PASSWORD:?set RAG_OPS_GRAFANA_ADMIN_PASSWORD in .env}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  minio_data:
  rag_ops_state:
  rag_ops_cache:
  rag_ops_runs:
  grafana_data:
